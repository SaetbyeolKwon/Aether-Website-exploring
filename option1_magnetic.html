<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f3; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: none; transition: background 0.5s; }
  body.dark { background: #0a0a0a; }
  #scene { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

  .letter-svg { position: absolute; top: 0; left: 0; width: 100%; will-change: transform; }

  body.dark .letter-svg path, body.dark .letter-svg polygon { fill: #ffffff; }
  #cursor { position: fixed; width: 10px; height: 10px; background: rgba(0,0,0,0.5); border-radius: 50%; pointer-events: none; z-index: 100; transform: translate(-50%,-50%); box-shadow: none; transition: background 0.5s, box-shadow 0.5s; }
  body.dark #cursor { background: rgba(120,200,255,0.9); box-shadow: 0 0 12px rgba(120,200,255,0.8); }
  #label { position: fixed; bottom: 32px; font-family: monospace; font-size: 11px; color: rgba(0,0,0,0.3); letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.5s; }
  body.dark #label { color: rgba(255,255,255,0.3); }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; font-family: monospace; opacity: 0.25; transition: opacity 0.3s; }
  nav:hover { opacity: 1; }
  nav::before { content: ''; position: absolute; inset: 0; background: linear-gradient(rgba(245,245,243,0.9), transparent); pointer-events: none; transition: background 0.5s; }
  body.dark nav::before { background: linear-gradient(rgba(10,10,10,0.9), transparent); }
  .nav-brand { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: #0a0a0a; text-decoration: none; position: relative; transition: color 0.5s; }
  body.dark .nav-brand { color: #fff; }
  .nav-links { display: flex; gap: 28px; position: relative; }
  .nav-links a { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(0,0,0,0.4); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover, .nav-links a.active { color: #0a0a0a; }
  .nav-links a.active { color: #0a0a0a; }
  body.dark .nav-links a { color: rgba(255,255,255,0.4); }
  body.dark .nav-links a:hover, body.dark .nav-links a.active { color: rgba(120,200,255,0.9); }

  /* 토글 버튼 */
  #theme-toggle {
    position: fixed; bottom: 32px; right: 36px;
    z-index: 300;
    width: 50px; height: 26px;
    background: rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.2);
    border-radius: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 7px;
    font-size: 12px;
    transition: background 0.5s, border-color 0.5s;
  }
  body.dark #theme-toggle {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.22);
  }
  #theme-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 10px;
    background: rgba(0,0,0,0.1);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), background 0.5s;
    pointer-events: none;
  }
  body.dark #theme-toggle::after {
    transform: translateX(22px);
    background: rgba(255,255,255,0.18);
  }
</style>

<div id="scene">

    <svg viewBox="0 0 653.5 156.4" style="width:100%;visibility:hidden;display:block;"></svg>

<div id="cursor"></div>
<div id="label">Option 1 — Magnetic Field</div>
<button id="theme-toggle" title="Toggle light/dark"><span>☀</span><span>☾</span></button>

<script>
const cursor = document.getElementById('cursor');
const canvas = document.getElementById('field-canvas');
const ctx = canvas.getContext('2d');

const letterIds = ['A','E','T','H','E2','R'];
const letters = letterIds.map(id => ({
  el: document.getElementById('letter-' + id),
  cx: 0, cy: 0,
  tx: 0, ty: 0,
  vx: 0, vy: 0,
  glow: 0,
}));

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let dots = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  buildDots();
}

function buildDots() {
  dots = [];
  const gapX = window.innerWidth / 38;
  const gapY = window.innerHeight / 18;
  for (let r = 0; r <= 18; r++) {
    for (let c = 0; c <= 38; c++) {
      dots.push({ ox: c * gapX, oy: r * gapY });
    }
  }
}

window.addEventListener('resize', resize);
resize();

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top = mouseY + 'px';
});

function getLetterCenter(letter) {
  const r = letter.el.getBoundingClientRect();
  // Each SVG covers full container — we use path bbox to find center
  // Use the SVG's bounding rect directly
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

// Approximate letter centers in normalized SVG coords (0-1)
const letterNormX = { A: 0.10, E: 0.31, T: 0.46, H: 0.59, E2: 0.78, R: 0.94 };

function getLetterScreenCenter(letter, id) {
  const r = letter.el.getBoundingClientRect();
  const nx = letterNormX[id] || 0.5;
  return {
    x: r.left + r.width * nx,
    y: r.top + r.height * 0.5
  };
}

const MAGNETIC_RADIUS = 180;
const MAGNETIC_STRENGTH = 6;
const SPRING = 0.055;
const DAMPING = 0.88;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Field dots
  dots.forEach(dot => {
    const ddx = mouseX - dot.ox;
    const ddy = mouseY - dot.oy;
    const dd = Math.sqrt(ddx*ddx + ddy*ddy);
    const pull = Math.max(0, 1 - dd / 180);
    const angle = Math.atan2(ddy, ddx);
    const dx = dot.ox + Math.cos(angle) * pull * 16;
    const dy = dot.oy + Math.sin(angle) * pull * 16;
    const alpha = 0.07 + pull * 0.3;
    const size = 1.3 + pull * 2;
    ctx.beginPath();
    ctx.arc(dx, dy, size, 0, Math.PI*2);
    const dotColor = isLight ? `rgba(0,0,0,${alpha * 0.8})` : `rgba(120,200,255,${alpha})`;
    const lineColor = isLight ? `rgba(0,0,0,${pull * 0.15})` : `rgba(120,200,255,${pull*0.25})`;
    ctx.fillStyle = dotColor;
    ctx.fill();
    if (pull > 0.12) {
      ctx.beginPath();
      ctx.moveTo(dot.ox, dot.oy);
      ctx.lineTo(dx, dy);
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  });

  // Update each letter
  letterIds.forEach((id, i) => {
    const letter = letters[i];
    const center = getLetterScreenCenter(letter, id);

    const dx = mouseX - center.x;
    const dy = mouseY - center.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const proximity = Math.max(0, 1 - dist / MAGNETIC_RADIUS);

    const targetX = proximity > 0 ? (dx / (dist||1)) * proximity * MAGNETIC_STRENGTH : 0;
    const targetY = proximity > 0 ? (dy / (dist||1)) * proximity * MAGNETIC_STRENGTH : 0;

    letter.vx = letter.vx * DAMPING + (targetX - letter.tx) * SPRING;
    letter.vy = letter.vy * DAMPING + (targetY - letter.ty) * SPRING;
    letter.tx += letter.vx;
    letter.ty += letter.vy;

    letter.glow += (proximity * 28 - letter.glow) * 0.12;

    letter.el.style.transform = `translate(${letter.tx}px, ${letter.ty}px)`;
    const glowColor = isLight
      ? `rgba(0,0,0,${proximity * 0.15})`
      : `rgba(120,200,255,${proximity * 0.8})`;
    letter.el.style.filter = `drop-shadow(0 0 ${letter.glow}px ${glowColor})`;

    // Color tint when close
    const paths = letter.el.querySelectorAll('path, polygon');
    paths.forEach(p => {
      if (isLight) {
        p.style.fill = `#0a0a0a`;
      } else {
        const g = Math.round(255 - proximity * 55);
        p.style.fill = `rgb(255,${g},255)`;
      }
    });
  });

  requestAnimationFrame(draw);
}

// 테마 토글
let isLight = true;
document.getElementById('theme-toggle').addEventListener('click', () => {
  isLight = !isLight;
  document.body.classList.toggle('dark', !isLight);
});

draw();

</script>
