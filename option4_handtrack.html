<canvas id="overlay-canvas"></canvas>
<video id="video" autoplay playsinline></video>
<div id="status">Initializing...</div>
<div id="label">Option 4 — Hand Tracking AI</div>
<button id="start-btn">Enable Camera</button>
<div id="legend">🤏 grab letter<br>🤏🤏 scale · rotate<br>✊ reset</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
const canvas = document.getElementById('overlay-canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('start-btn');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Letter setup
const letterNormX = { A: 0.10, E: 0.31, T: 0.46, H: 0.59, E2: 0.78, R: 0.94 };
const letterIds = ['A', 'E', 'T', 'H', 'E2', 'R'];
const letters = letterIds.map((id, i) => ({
  el: document.getElementById('letter-' + id),
  id,
  tx: 0, ty: 0,
  vx: 0, vy: 0,
  scale: 1,
  fistDelay: Math.random() * 0.08, // random stagger, all roughly together
}));

function isFist(lm, pinching) {
  if (pinching) return false; // pinch always takes priority
  // Middle, ring, pinky curled + index clearly curled past MCP (not just pip)
  const middleCurled = lm[12].y > lm[10].y;
  const ringCurled   = lm[16].y > lm[14].y;
  const pinkyCurled  = lm[20].y > lm[18].y;
  const indexCurled  = lm[8].y > lm[5].y; // stricter: tip past MCP, not just PIP
  return indexCurled && middleCurled && ringCurled && pinkyCurled;
}

let fistProgress = 0; // 0 = open, 1 = fully crushed

function getLetterCenter(letter) {
  const r = letter.el.getBoundingClientRect();
  return {
    x: r.left + r.width * letterNormX[letter.id],
    y: r.top + r.height * 0.5
  };
}

const PINCH_THRESHOLD = 30;
const SPRING = 0.12;
const DAMPING = 0.75;
const logoContainer = document.getElementById('logo-container');

// Per-hand state
let handStates = []; // [{thumbTip, indexTip, handCenter, rawLandmarks, isPinching, pinchMid}]

// Scale + rotation state
let logoScale = 1;
let logoRotation = 0;
let initialPinchDist = null;
let initialPinchAngle = null;
let baseLogoScale = 1;
let baseLogoRotation = 0;

// Single-hand grab state
let grabbedLetter = null;
let grabOffset = { x: 0, y: 0 };

function parseHand(lm, handedness) {
  const W = window.innerWidth, H = window.innerHeight;
  const thumbTip   = { x: (1 - lm[4].x) * W, y: lm[4].y * H };
  const indexTip   = { x: (1 - lm[8].x) * W, y: lm[8].y * H };
  const handCenter = { x: (1 - lm[9].x) * W, y: lm[9].y * H };
  const dx = thumbTip.x - indexTip.x;
  const dy = thumbTip.y - indexTip.y;
  const isPinching = Math.sqrt(dx*dx + dy*dy) < PINCH_THRESHOLD;
  const pinchMid = { x: (thumbTip.x + indexTip.x) / 2, y: (thumbTip.y + indexTip.y) / 2 };
  // Video is mirrored: MediaPipe "Right" = user's left hand on screen
  const isLeft = handedness === 'Right';
  return { thumbTip, indexTip, handCenter, rawLandmarks: lm, isPinching, pinchMid, isLeft };
}

function onResults(results) {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    handStates = results.multiHandLandmarks.map((lm, i) =>
      parseHand(lm, results.multiHandedness?.[i]?.label || 'Left')
    );
  } else {
    handStates = [];
  }
}

let cameraStarted = false;
startBtn.addEventListener('click', async () => {
  if (cameraStarted) return;
  cameraStarted = true;
  startBtn.style.display = 'none';
  statusEl.textContent = 'Loading model...';
  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
  hands.onResults(onResults);
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
  video.srcObject = stream;
  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 320, height: 240
  });
  camera.start();
  statusEl.textContent = 'Scanning...';
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const bothPinching = handStates.length === 2 && handStates[0].isPinching && handStates[1].isPinching;
  const singleHand = handStates.length > 0 ? handStates[0] : null;
  const fistDetected = !bothPinching && singleHand
    ? isFist(singleHand.rawLandmarks, singleHand.isPinching)
    : false;

  // ── Two-hand scale mode ──
  if (bothPinching) {
    grabbedLetter = null;
    const p0 = handStates[0].pinchMid;
    const p1 = handStates[1].pinchMid;
    const currentDist = Math.sqrt((p0.x-p1.x)**2 + (p0.y-p1.y)**2);
    const currentAngle = Math.atan2(p1.y - p0.y, p1.x - p0.x);
    if (initialPinchDist === null) {
      initialPinchDist = currentDist;
      initialPinchAngle = currentAngle;
      baseLogoScale = logoScale;
      baseLogoRotation = logoRotation;
    }
    logoScale = Math.max(0.2, Math.min(4, baseLogoScale * (currentDist / initialPinchDist)));
    const angleDelta = (currentAngle - initialPinchAngle) * (180 / Math.PI);
    logoRotation = baseLogoRotation + angleDelta;
  } else {
    initialPinchDist = null;
    initialPinchAngle = null;
    // Keep scale and rotation as-is
  }
  logoContainer.style.transform = `scale(${logoScale}) rotate(${logoRotation}deg)`;

  // ── Single-hand grab mode ──
  if (!bothPinching && singleHand && singleHand.isPinching) {
    if (!grabbedLetter) {
      let minDist = Infinity;
      letters.forEach(letter => {
        const c = getLetterCenter(letter);
        const dx = singleHand.handCenter.x - c.x;
        const dy = singleHand.handCenter.y - c.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < minDist && d < 100) {
          minDist = d;
          grabbedLetter = letter;
          grabOffset = { x: letter.tx - singleHand.handCenter.x, y: letter.ty - singleHand.handCenter.y };
        }
      });
    } else {
      const targetX = singleHand.handCenter.x + grabOffset.x;
      const targetY = singleHand.handCenter.y + grabOffset.y;
      grabbedLetter.vx = grabbedLetter.vx * DAMPING + (targetX - grabbedLetter.tx) * SPRING;
      grabbedLetter.vy = grabbedLetter.vy * DAMPING + (targetY - grabbedLetter.ty) * SPRING;
      grabbedLetter.tx += grabbedLetter.vx;
      grabbedLetter.ty += grabbedLetter.vy;
    }
  } else if (!bothPinching) {
    grabbedLetter = null;
  }

  // ── Fist crumple ──
  if (fistDetected) {
    fistProgress = Math.min(1, fistProgress + 0.025);
    // Pull scale and rotation back to neutral while crushing
    logoScale += (1 - logoScale) * 0.08;
    logoRotation += (0 - logoRotation) * 0.08;
    logoContainer.style.transform = `scale(${logoScale}) rotate(${logoRotation}deg)`;
  } else {
    fistProgress += (0 - fistProgress) * 0.1;
  }

  // ── Letter transforms ──
  letters.forEach(letter => {
    if (letter !== grabbedLetter) {
      if (fistDetected) {
        // While fisting, pull letters back to origin
        letter.tx += (0 - letter.tx) * 0.08;
        letter.ty += (0 - letter.ty) * 0.08;
        letter.vx = 0; letter.vy = 0;
      } else {
        letter.vx *= DAMPING;
        letter.vy *= DAMPING;
        letter.tx += letter.vx;
        letter.ty += letter.vy;
      }
    }
    const letterFist = Math.max(0, Math.min(1, fistProgress - letter.fistDelay));
    const s = 1 - letterFist * 0.97;
    const rot = letterFist * (letter.fistDelay % 0.12 > 0.06 ? 4 : -4);
    letter.el.style.transform = `translate(${letter.tx}px, ${letter.ty}px) scale(${s}) rotate(${rot}deg)`;
    letter.el.style.opacity = 1 - letterFist * 0.85;
  });

  // ── Emoji cursors ──
  ctx.font = '36px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  let statusText = 'Scanning...';
  handStates.forEach(hand => {
    const emoji = fistDetected ? '✊' : hand.isPinching ? '🤏' : '🖐️';
    // 🤏 flips when isLeft, ✊/🖐️ flip when NOT isLeft
    const shouldFlip = hand.isPinching ? hand.isLeft : !hand.isLeft;
    ctx.save();
    ctx.translate(hand.handCenter.x, hand.handCenter.y);
    if (shouldFlip) ctx.scale(-1, 1);
    ctx.fillText(emoji, 0, 0);
    ctx.restore();
  });

  if (handStates.length > 0) {
    if (bothPinching) statusText = `Scale ${logoScale.toFixed(2)}×`;
    else if (singleHand?.isPinching) statusText = grabbedLetter ? `Grabbing ${grabbedLetter.id.replace('2','')}` : 'Pinching';
    else if (fistDetected) statusText = 'Crushing';
    else statusText = `${handStates.length} hand${handStates.length>1?'s':''} detected`;
    statusEl.style.color = 'rgba(120,200,255,0.9)';
  } else if (cameraStarted) {
    statusEl.style.color = 'rgba(120,200,255,0.4)';
  }
  statusEl.textContent = statusText;

  requestAnimationFrame(draw);
}

draw();
</script>
